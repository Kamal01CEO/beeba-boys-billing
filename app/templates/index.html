<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ shop_name }} — Billing</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --primary: #1a237e;
            --primary-light: #283593;
            --primary-dark: #0d1442;
            --accent: #ff6f00;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-muted: #666;
            --border: #e0e0e0;
            --success: #2e7d32;
            --danger: #c62828;
            --red-light: #ffebee;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            position: relative;
        }

        /* ─── Watermark Background ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url(/static/logo.png) center / contain no-repeat;
            opacity: 0.04;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: transparent;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Header ─── */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(26,35,126,0.25);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header-logo {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            object-fit: cover;
            background: rgba(255,255,255,0.15);
            padding: 2px;
        }
        .header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
        .header .subtitle { font-size: 0.75rem; opacity: 0.7; margin-top: 1px; }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header .stats { text-align: right; font-size: 0.8rem; }
        .header .stats .amount { font-size: 1.2rem; font-weight: 800; color: #ffd54f; }
        .header .stats .label { opacity:0.75; }
        .header .stats .sublabel { font-size:0.7rem; opacity:0.6; }

        .gear-btn {
            background: rgba(255,255,255,0.12);
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gear-btn:hover { background: rgba(255,255,255,0.25); }

        /* ─── Container ─── */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        /* ─── Cards ─── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
        }
        .card h2 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--primary);
            border-bottom: 2px solid #e8eaf6;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafafa;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26,35,126,0.1);
            background: white;
        }

        /* ─── Item Grid ─── */
        .items-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .item-btn {
            padding: 14px 10px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s;
            text-align: center;
        }
        .item-btn:hover {
            border-color: var(--primary);
            background: #e8eaf6;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26,35,126,0.12);
        }
        .item-btn:active { transform: translateY(0); }

        /* ─── Bill Items ─── */
        .bill-items { margin-bottom: 14px; }
        .bill-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #f8f9ff;
            border-radius: 10px;
            margin-bottom: 6px;
            gap: 8px;
            border: 1px solid #eef0ff;
            transition: background 0.2s;
        }
        .bill-item:hover { background: #eef0ff; }
        .bill-item .name { font-weight: 700; min-width: 80px; font-size: 0.9rem; }
        .bill-item .price-input {
            width: 100px;
            padding: 6px 10px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: right;
            background: white;
        }
        .bill-item .price-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(26,35,126,0.15);
        }
        .bill-item .qty-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .bill-item .qty-group button {
            width: 28px; height: 28px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            transition: background 0.15s;
        }
        .bill-item .qty-group button:hover { background: #e8eaf6; border-color: var(--primary); }
        .bill-item .qty-group span { font-weight: 700; min-width: 20px; text-align: center; font-size: 0.9rem; }
        .bill-item .line-total { font-weight: 800; color: var(--primary); min-width: 65px; text-align: right; font-size: 0.9rem; }
        .bill-item .remove-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .bill-item .remove-btn:hover { background: var(--red-light); }

        /* ─── Payment ─── */
        .payment-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .payment-btn {
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.15s;
            text-align: center;
        }
        .payment-btn:hover { border-color: var(--primary); background: #f0f1ff; }
        .payment-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        /* ─── Total Bar ─── */
        .total-bar {
            background: linear-gradient(135deg, #e8eaf6, #eef0ff);
            border-radius: 10px;
            padding: 14px 18px;
            margin: 14px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-bar .label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
        .total-bar .amount { font-size: 1.6rem; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26,35,126,0.3);
        }
        .submit-btn:disabled {
            background: #9fa8da;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ─── Recent Bills ─── */
        .recent-bills {
            max-height: 500px;
            overflow-y: auto;
        }
        .recent-bills::-webkit-scrollbar { width: 5px; }
        .recent-bills::-webkit-scrollbar-track { background: transparent; }
        .recent-bills::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

        .recent-item {
            padding: 12px 14px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.85rem;
            transition: background 0.15s;
            position: relative;
        }
        .recent-item:last-child { border-bottom: none; }
        .recent-item:hover { background: #f8f9ff; }

        .recent-item.deleted {
            background: #fef2f2;
            opacity: 0.7;
        }
        .recent-item.deleted:hover { background: #fde8e8; }
        .recent-item.deleted .customer { text-decoration: line-through; color: #999; }
        .recent-item.deleted .amount { color: #999 !important; }

        .recent-item .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .recent-item .bill-no {
            font-weight: 800;
            color: var(--primary);
            font-size: 0.9rem;
        }
        .recent-item .bill-no .del-badge {
            display: inline-block;
            background: var(--danger);
            color: white;
            font-size: 0.6rem;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 700;
            margin-left: 6px;
            text-transform: uppercase;
        }
        .recent-item .customer { font-weight: 600; color: var(--text); font-size: 0.9rem; }
        .recent-item .amount {
            font-weight: 800;
            color: var(--primary);
            font-size: 1rem;
        }
        .recent-item .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .recent-item .meta .payment-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.7rem;
        }
        .payment-type.cash { background: #e8f5e9; color: #2e7d32; }
        .payment-type.upi { background: #e3f2fd; color: #1565c0; }

        .recent-item .actions {
            display: flex;
            gap: 4px;
        }
        .recent-item .actions button {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.15s;
        }
        .recent-item .actions .edit-btn:hover {
            border-color: #1565c0;
            background: #e3f2fd;
        }
        .recent-item .actions .delete-btn:hover {
            border-color: var(--danger);
            background: var(--red-light);
        }
        .recent-item .actions .save-btn {
            border-color: var(--success);
            background: #e8f5e9;
            font-weight: 600;
        }
        .recent-item .actions .save-btn:hover { background: #c8e6c9; }
        .recent-item .actions .cancel-btn {
            border-color: var(--text-muted);
            color: var(--text-muted);
        }
        .recent-item .actions .cancel-btn:hover { background: #f5f5f5; }

        /* Edit mode */
        .recent-item .edit-field {
            padding: 4px 8px;
            border: 1.5px solid var(--primary);
            border-radius: 6px;
            font-size: 0.85rem;
            width: 100%;
            margin: 2px 0;
        }
        .recent-item .edit-field:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(26,35,126,0.15);
        }

        /* ─── Settings Modal ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 440px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity:0; transform:scale(0.95) translateY(10px); }
            to { opacity:1; transform:scale(1) translateY(0); }
        }
        .modal-header {
            padding: 18px 24px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 { font-size: 1.1rem; font-weight: 700; border: none; margin:0; padding:0; color: var(--text); }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .modal-close:hover { background: #f5f5f5; color: #333; }
        .modal-body { padding: 20px 24px; }
        .modal-body .form-group { margin-bottom: 16px; }
        .modal-footer {
            padding: 14px 24px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .modal-footer button {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .modal-footer .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
        }
        .modal-footer .btn-primary:hover { background: var(--primary-light); }
        .modal-footer .btn-secondary {
            background: white;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .modal-footer .btn-secondary:hover { background: #f5f5f5; }

        .logo-preview {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px dashed var(--border);
            background: #fafafa;
            margin-top: 8px;
        }
        .logo-upload-area {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 8px;
        }
        .logo-upload-area input[type="file"] { display: none; }
        .logo-upload-btn {
            display: inline-block;
            padding: 8px 16px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }
        .logo-upload-btn:hover { border-color: var(--primary); background: #e8eaf6; }

        /* ─── Toast ─── */
        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 14px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
            z-index: 300;
            max-width: 360px;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.info { background: #1565c0; }

        /* ─── Responsive ─── */
        @media (max-width: 860px) {
            .container { grid-template-columns: 1fr; }
            .header { flex-wrap: wrap; gap: 8px; padding: 12px 16px; }
            .header-left h1 { font-size: 1rem; }
            .header .stats { text-align: left; }
            .header-right { gap: 10px; }
            .bill-item { flex-wrap: wrap; }
            .bill-item .price-input { width: 80px; }
        }

        .empty-state {
            text-align: center;
            color: #bbb;
            padding: 30px 20px;
        }
        .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }
        .empty-state .text { font-size: 0.85rem; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <img src="/static/logo.png" alt="Logo" class="header-logo" id="headerLogo"
                 onerror="this.style.display='none'">
            <div>
                <h1>🧾 {{ shop_name }}</h1>
                <div class="subtitle">Billing Dashboard</div>
            </div>
        </div>
        <div class="header-right">
            <div class="stats">
                <div><span class="label">💰 Today</span> <span class="amount" id="todayTotal">₹0</span></div>
                <div class="sublabel">
                    Cash: <span id="todayCash">₹0</span>
                    · UPI: <span id="todayUpi">₹0</span>
                </div>
            </div>
            <button class="gear-btn" id="settingsBtn" title="Settings">⚙️</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Left: Billing Form -->
        <div class="card">
            <h2>📝 New Bill</h2>
            <form id="billForm" autocomplete="off">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group">
                        <label>Customer Name *</label>
                        <input type="text" id="customerName" placeholder="Enter name" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="phone" placeholder="98XXXXXXXX">
                    </div>
                </div>

                <label style="font-size:0.8rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">
                    Select Items — tap to add
                </label>
                <div class="items-grid">
                    <button type="button" class="item-btn" data-name="Jeans">👖 Jeans</button>
                    <button type="button" class="item-btn" data-name="Shirt">👔 Shirt</button>
                    <button type="button" class="item-btn" data-name="T-Shirt">👕 T-Shirt</button>
                    <button type="button" class="item-btn" data-name="Accessories">🧢 Accessories</button>
                </div>

                <div class="bill-items" id="billItems">
                    <div class="empty-state">
                        <div class="icon">👆</div>
                        <div class="text">Tap an item above to add</div>
                    </div>
                </div>

                <div class="total-bar">
                    <span class="label">Total</span>
                    <span class="amount" id="totalAmount">₹0</span>
                </div>

                <label style="font-size:0.8rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">
                    Payment Type
                </label>
                <div class="payment-options">
                    <button type="button" class="payment-btn active" data-payment="Cash">💵 Cash</button>
                    <button type="button" class="payment-btn" data-payment="UPI">📱 UPI</button>
                </div>

                <input type="hidden" id="paymentType" value="Cash">
                <button type="submit" class="submit-btn" id="generateBtn">
                    🖨️ Generate & Print Bill
                </button>
            </form>
        </div>

        <!-- Right: Recent Bills -->
        <div class="card">
            <h2>
                <span>📋 Recent Bills</span>
                <button style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.85rem;" onclick="loadEarnings()" title="Refresh">🔄</button>
            </h2>
            <div class="recent-bills" id="recentBills">
                <div class="empty-state">
                    <div class="icon">🧾</div>
                    <div class="text">No bills yet today</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>⚙️ Settings</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Shop Name</label>
                    <input type="text" id="settingsShopName" value="{{ shop_name }}">
                </div>
                <div class="form-group">
                    <label>Shop Address</label>
                    <input type="text" id="settingsAddress" placeholder="Your shop address">
                </div>
                <div class="form-group">
                    <label>Bill Footer</label>
                    <input type="text" id="settingsFooter" placeholder="Thank you! Visit again!">
                </div>
                <div class="form-group">
                    <label>Shop Logo</label>
                    <div class="logo-upload-area">
                        <img src="/static/logo.png" alt="Logo preview" class="logo-preview" id="logoPreview"
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22><rect width=%2280%22 height=%2280%22 fill=%22%23f0f0f0%22/><text x=%2220%22 y=%2245%22 font-size=%2230%22>🧾</text></svg>'">
                        <label class="logo-upload-btn" id="logoUploadBtn">Choose File</label>
                        <input type="file" id="logoFileInput" accept="image/*">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="settingsCancel">Cancel</button>
                <button class="btn-primary" id="settingsSave">💾 Save Settings</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        // ─── State ───
        let billItems = [];
        let paymentType = 'Cash';
        let editingBillNo = null;
        let editOriginalHTML = '';

        // ─── Init ───
        document.addEventListener('DOMContentLoaded', () => {
            loadEarnings();
            // Auto-refresh every 10s
            setInterval(loadEarnings, 10000);
            loadSettings();
        });

        // ─── Load Settings ───
        async function loadSettings() {
            try {
                const [addrRes, footerRes] = await Promise.all([
                    fetch('/settings/shop_address'),
                    fetch('/settings/bill_footer'),
                ]);
                const addr = await addrRes.json();
                const footer = await footerRes.json();
                if (addr.success) document.getElementById('settingsAddress').value = addr.value || '';
                if (footer.success) document.getElementById('settingsFooter').value = footer.value || '';
            } catch(e) {}
        }

        // ─── Item Buttons ───
        document.querySelectorAll('.item-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const name = btn.dataset.name;
                const existing = billItems.find(i => i.name === name);
                if (existing) {
                    existing.qty += 1;
                } else {
                    billItems.push({ name, price: 0, qty: 1 });
                }
                renderBillList();
                updateTotal();
                setTimeout(() => {
                    const inputs = document.querySelectorAll('.bill-item .price-input');
                    const lastInput = inputs[inputs.length - 1];
                    if (lastInput) { lastInput.focus(); lastInput.select(); }
                }, 50);
            });
        });

        // ─── Payment Buttons ───
        document.querySelectorAll('.payment-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                paymentType = btn.dataset.payment;
                document.getElementById('paymentType').value = paymentType;
            });
        });

        // ─── Render Bill Items List ───
        function renderBillList() {
            const container = document.getElementById('billItems');
            if (billItems.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">👆</div><div class="text">Tap an item above to add</div></div>';
                return;
            }
            let html = '';
            billItems.forEach((item, index) => {
                const lineTotal = item.qty * (item.price || 0);
                html += `
                    <div class="bill-item">
                        <div class="name">${item.name}</div>
                        <input type="number" class="price-input" value="${item.price || ''}"
                               placeholder="Price" min="0" data-index="${index}">
                        <div class="qty-group">
                            <button type="button" class="qty-btn" data-index="${index}" data-delta="-1">−</button>
                            <span class="qty-val">${item.qty}</span>
                            <button type="button" class="qty-btn" data-index="${index}" data-delta="1">+</button>
                        </div>
                        <div class="line-total">₹${lineTotal}</div>
                        <button type="button" class="remove-btn" data-index="${index}">×</button>
                    </div>`;
            });
            container.innerHTML = html;
        }

        // ─── Update Total (no DOM rebuild) ───
        function updateTotal() {
            const total = billItems.reduce((sum, item) => sum + item.qty * (item.price || 0), 0);
            document.getElementById('totalAmount').textContent = `₹${total}`;
            document.querySelectorAll('.bill-item').forEach((el, i) => {
                const lt = el.querySelector('.line-total');
                if (lt && billItems[i]) {
                    lt.textContent = `₹${billItems[i].qty * (billItems[i].price || 0)}`;
                }
            });
        }

        // ─── Event Delegation: Bill Items (no focus loss on price input) ───
        document.getElementById('billItems').addEventListener('click', (e) => {
            const target = e.target;

            // Remove
            if (target.classList.contains('remove-btn')) {
                const idx = parseInt(target.dataset.index);
                billItems.splice(idx, 1);
                renderBillList();
                updateTotal();
                return;
            }

            // Qty
            if (target.classList.contains('qty-btn')) {
                const idx = parseInt(target.dataset.index);
                const delta = parseInt(target.dataset.delta);
                billItems[idx].qty = Math.max(0, billItems[idx].qty + delta);
                if (billItems[idx].qty === 0) {
                    billItems.splice(idx, 1);
                }
                renderBillList();
                updateTotal();
                const inputs = document.querySelectorAll('.bill-item .price-input');
                const focusIdx = Math.min(idx, inputs.length - 1);
                if (inputs[focusIdx]) inputs[focusIdx].focus();
                return;
            }
        });

        // Price input event delegation — no DOM rebuild on input
        document.getElementById('billItems').addEventListener('input', (e) => {
            if (e.target.classList.contains('price-input')) {
                const idx = parseInt(e.target.dataset.index);
                billItems[idx].price = parseFloat(e.target.value) || 0;
                const lineTotals = document.querySelectorAll('.line-total');
                if (lineTotals[idx]) {
                    lineTotals[idx].textContent = `₹${billItems[idx].qty * billItems[idx].price}`;
                }
                updateTotal();
            }
        });

        // ─── Submit Bill ───
        document.getElementById('billForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('generateBtn');
            const customerName = document.getElementById('customerName').value.trim();

            if (!customerName) { showToast('Please enter customer name', 'error'); return; }
            if (billItems.length === 0) { showToast('Add at least one item', 'error'); return; }
            const missingPrice = billItems.some(i => !i.price || i.price <= 0);
            if (missingPrice) { showToast('Enter price for all items', 'error'); return; }

            btn.disabled = true;
            btn.textContent = '⏳ Generating...';

            const formData = new FormData();
            formData.append('customer_name', customerName);
            formData.append('phone', document.getElementById('phone').value.trim());
            formData.append('payment_type', paymentType);
            billItems.forEach(item => {
                formData.append('item_name[]', item.name);
                formData.append('item_qty[]', item.qty);
                formData.append('item_price[]', item.price);
            });

            try {
                const res = await fetch('/generate-bill', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    showToast(`✅ Bill #${data.bill_no} — ₹${data.total}`, 'success');
                    billItems = [];
                    document.getElementById('customerName').value = '';
                    document.getElementById('phone').value = '';
                    renderBillList();
                    updateTotal();
                    loadEarnings();
                } else {
                    showToast(`❌ ${data.error}`, 'error');
                }
            } catch (err) {
                showToast('❌ Network error', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🖨️ Generate & Print Bill';
            }
        });

        // ─── Load Earnings ───
        async function loadEarnings() {
            try {
                const res = await fetch('/earnings');
                const data = await res.json();
                if (!data.success) return;

                document.getElementById('todayTotal').textContent = `₹${data.total}`;
                document.getElementById('todayCash').textContent = `₹${data.cash}`;
                document.getElementById('todayUpi').textContent = `₹${data.upi}`;

                renderRecentBills(data.recent || [], data.deleted_bills || []);
            } catch(e) {}
        }

        // ─── Render Recent Bills ───
        function renderRecentBills(active, deleted) {
            const container = document.getElementById('recentBills');
            const all = [...active, ...deleted];

            if (all.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">🧾</div><div class="text">No bills yet today</div></div>';
                return;
            }

            let html = '';
            all.forEach(bill => {
                const isDeleted = bill.status === 'deleted';
                const ptype = (bill.payment_type || '').toLowerCase();

                html += `
                    <div class="recent-item ${isDeleted ? 'deleted' : ''}" data-bill="${bill.bill_no}">
                        <div class="top-row">
                            <span class="bill-no">
                                #${bill.bill_no}
                                ${isDeleted ? '<span class="del-badge">Deleted</span>' : ''}
                            </span>
                            <span class="amount">₹${bill.total}</span>
                        </div>
                        <div class="customer" id="cust_${bill.bill_no}">${bill.customer}</div>
                        <div class="meta">
                            <span>
                                <span id="items_${bill.bill_no}">${bill.items}</span>
                                <span style="margin:0 6px">·</span>
                                <span id="ts_${bill.bill_no}">${bill.timestamp}</span>
                            </span>
                            <div style="display:flex;align-items:center;gap:6px;">
                                <span class="payment-type ${ptype}" id="ptype_${bill.bill_no}">${bill.payment_type}</span>
                                ${isDeleted ? '' : `
                                <div class="actions" style="display:flex;gap:4px;">
                                    <button class="edit-btn" data-bill="${bill.bill_no}" onclick="startEdit(${bill.bill_no})">✏️</button>
                                    <button class="delete-btn" data-bill="${bill.bill_no}" onclick="deleteBill(${bill.bill_no})">🗑️</button>
                                </div>
                                `}
                            </div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        // ─── Delete Bill ───
        async function deleteBill(billNo) {
            if (!confirm(`Delete bill #${billNo}?`)) return;
            try {
                const res = await fetch(`/delete-bill/${billNo}`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(`🗑️ Bill #${billNo} deleted`, 'info');
                    loadEarnings();
                } else {
                    showToast(`❌ ${data.error}`, 'error');
                }
            } catch(e) {
                showToast('❌ Network error', 'error');
            }
        }

        // ─── Edit Bill (Inline) ───
        function startEdit(billNo) {
            if (editingBillNo) cancelEdit(editingBillNo);

            const item = document.querySelector(`.recent-item[data-bill="${billNo}"]`);
            if (!item) return;
            editingBillNo = billNo;

            const custEl = document.getElementById(`cust_${billNo}`);
            const itemsEl = document.getElementById(`items_${billNo}`);
            const ptypeEl = document.getElementById(`ptype_${billNo}`);

            editOriginalHTML = item.innerHTML;

            const currentCust = custEl.textContent;
            const currentItems = itemsEl.textContent;
            const currentPtype = ptypeEl.textContent;

            const topRow = item.querySelector('.top-row');
            const meta = item.querySelector('.meta');

            // Replace edit/delete buttons with save/cancel
            const actionsDiv = item.querySelector('.actions');
            if (actionsDiv) {
                actionsDiv.innerHTML = `
                    <button class="save-btn" onclick="saveEdit(${billNo})">💾</button>
                    <button class="cancel-btn" onclick="cancelEdit(${billNo})">❌</button>`;
            }

            // Make customer editable
            custEl.innerHTML = `<input class="edit-field" type="text" id="edit_cust_${billNo}" value="${currentCust}">`;
            // Make items editable
            itemsEl.innerHTML = `<input class="edit-field" type="text" id="edit_items_${billNo}" value="${currentItems}">`;
            // Make payment type editable
            ptypeEl.outerHTML = `<select class="edit-field" id="edit_ptype_${billNo}" style="width:auto;display:inline-block;">
                <option value="Cash" ${currentPtype === 'Cash' ? 'selected' : ''}>Cash</option>
                <option value="UPI" ${currentPtype === 'UPI' ? 'selected' : ''}>UPI</option>
            </select>`;
        }

        async function saveEdit(billNo) {
            const customer = document.getElementById(`edit_cust_${billNo}`)?.value || '';
            const items = document.getElementById(`edit_items_${billNo}`)?.value || '';
            const payment = document.getElementById(`edit_ptype_${billNo}`)?.value || 'Cash';

            const formData = new URLSearchParams();
            formData.append('customer_name', customer);
            formData.append('items', items);
            formData.append('payment_type', payment);

            try {
                const res = await fetch(`/edit-bill/${billNo}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString(),
                });
                const data = await res.json();
                if (data.success) {
                    showToast(`✅ Bill #${billNo} updated`, 'success');
                    editingBillNo = null;
                    loadEarnings();
                } else {
                    showToast(`❌ ${data.error}`, 'error');
                }
            } catch(e) {
                showToast('❌ Network error', 'error');
            }
        }

        function cancelEdit(billNo) {
            const item = document.querySelector(`.recent-item[data-bill="${billNo}"]`);
            if (item && editOriginalHTML) {
                item.innerHTML = editOriginalHTML;
            }
            editingBillNo = null;
        }

        // ─── Settings Modal ───
        const modal = document.getElementById('settingsModal');
        const settingsBtn = document.getElementById('settingsBtn');
        const modalClose = document.getElementById('modalClose');
        const settingsCancel = document.getElementById('settingsCancel');
        const settingsSave = document.getElementById('settingsSave');
        const logoInput = document.getElementById('logoFileInput');
        const logoPreview = document.getElementById('logoPreview');

        settingsBtn.addEventListener('click', () => modal.classList.add('open'));
        modalClose.addEventListener('click', () => modal.classList.remove('open'));
        settingsCancel.addEventListener('click', () => modal.classList.remove('open'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });

        // Logo file picker
        document.getElementById('logoUploadBtn').addEventListener('click', () => logoInput.click());
        logoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => { logoPreview.src = ev.target.result; };
                reader.readAsDataURL(file);
            }
        });

        // Save settings
        settingsSave.addEventListener('click', async () => {
            const shopName = document.getElementById('settingsShopName').value.trim();
            const address = document.getElementById('settingsAddress').value.trim();
            const footer = document.getElementById('settingsFooter').value.trim();
            const logoFile = logoInput.files[0];

            try {
                // Save text settings
                const saves = [];
                if (shopName) {
                    saves.push(
                        fetch('/settings', {
                            method: 'POST',
                            body: new URLSearchParams({ key: 'shop_name', value: shopName }),
                        })
                    );
                }
                if (address) {
                    saves.push(
                        fetch('/settings', {
                            method: 'POST',
                            body: new URLSearchParams({ key: 'shop_address', value: address }),
                        })
                    );
                }
                if (footer) {
                    saves.push(
                        fetch('/settings', {
                            method: 'POST',
                            body: new URLSearchParams({ key: 'bill_footer', value: footer }),
                        })
                    );
                }
                // Upload logo
                if (logoFile) {
                    const logoData = new FormData();
                    logoData.append('logo', logoFile);
                    saves.push(fetch('/upload-logo', { method: 'POST', body: logoData }));
                }

                await Promise.all(saves);
                showToast('✅ Settings saved', 'success');
                modal.classList.remove('open');

                // Update header shop name if changed
                if (shopName) {
                    document.querySelector('.header h1').textContent = '🧾 ' + shopName;
                }
                // Reload header logo
                const headerLogo = document.getElementById('headerLogo');
                if (headerLogo) {
                    headerLogo.src = '/static/logo.png?' + Date.now();
                }
            } catch(e) {
                showToast('❌ Error saving settings', 'error');
            }
        });

        // ─── Toast ───
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3500);
        }
    </script>
</body>
</html>
